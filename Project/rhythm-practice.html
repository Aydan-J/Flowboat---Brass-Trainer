<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ValveTrainer — Rhythm Practice</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .stats-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 1rem;
      font-family: var(--font-display);
    }
    .stat-pill {
      background: var(--bg-card);
      padding: 0.5rem 1.5rem;
      border-radius: 50px;
      border: 1px solid var(--border);
      font-weight: 700;
      box-shadow: var(--shadow);
    }
    .game-area {
      position: relative;
      background: #fff;
      border-radius: var(--radius-lg);
      overflow: hidden;
      min-height: 400px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      margin-top: 1rem;
    }
    #scrollingTrack {
      width: 100%;
      height: 300px;
      overflow: hidden;
      position: relative;
      white-space: nowrap;
    }
    #staffContainer {
      position: absolute;
      top: 0;
      left: 0;
    }
    .sweep-line {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 2px;
      background: #ef4444;
      z-index: 10;
      pointer-events: none;
      box-shadow: 0 0 8px rgba(239, 68, 68, 0.5);
    }
    .feedback-box {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 0.5rem 2rem;
      border-radius: 8px;
      font-weight: 800;
      font-size: 1.5rem;
      z-index: 100;
      display: none;
    }
    .feedback-box.correct { background: #10b981; color: white; display: block; }
    .feedback-box.wrong { background: #ef4444; color: white; display: block; }

    .game-overlay {
      position: absolute;
      inset: 0;
      background: var(--bg-card);
      backdrop-filter: blur(8px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 50;
      padding: 1rem;
    }
    .setup-card {
      width: 100%;
      max-width: 600px;
      background: var(--bg-secondary);
      padding: 2rem;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
    }
    .config-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }
    .config-label { display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem; color: var(--text-muted); }
    .input-field { width: 100%; padding: 0.6rem; background: var(--bg-primary); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-primary); }
    .checkbox-group { display: grid; gap: 0.8rem; }
    .checkbox-item { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 0.95rem; }
    
    .arrow-marker {
      position: absolute;
      bottom: 60px;
      font-size: 1.5rem;
      transform: translateX(-50%);
      z-index: 20;
    }
    .arrow-green { color: #10b981; }
    .arrow-red { color: #ef4444; }

    .game-controls {
      position: absolute;
      bottom: 1rem;
      right: 1rem;
      display: none;
      gap: 0.5rem;
      z-index: 60;
    }
    .control-btn {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 0.5rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }

    #messageBox {
      margin-top: 1rem;
      padding: 1rem;
      border-radius: var(--radius-md);
      text-align: center;
      font-weight: 700;
      display: none;
    }
    #messageBox.wrong { background: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; display: block; }
    #messageBox.correct { background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; display: block; }

  </style>
</head>
<body>

  <!-- TOP BAR -->
  <header class="top-bar">
    <div class="nav-brand">
      <span class="brand-icon">🎺</span>
      <span class="brand-text">Valve<span>Trainer</span></span>
    </div>
  </header>

  <!-- SIDEBAR NAV -->
  <nav class="navbar">
    <ul class="nav-links">
      <li><a href="index.html"><span class="link-emoji">🏠</span><span class="link-text">Home</span></a></li>
      <li><a href="practice.html"><span class="link-emoji">🎵</span><span class="link-text">Practice</span></a></li>
      <li><a href="progress.html"><span class="link-emoji">📈</span><span class="link-text">Progress</span></a></li>
      <li><a href="feedback.html"><span class="link-emoji">📝</span><span class="link-text">Notes</span></a></li>
      <li><a href="pitch.html"><span class="link-emoji">🎯</span><span class="link-text">Pitch</span></a></li>
      <li><a href="keys.html"><span class="link-emoji">🎹</span><span class="link-text">Keys</span></a></li>
      <li><a href="games.html" class="active"><span class="link-emoji">🎮</span><span class="link-text">Games</span></a></li>
      <li><a href="create.html"><span class="link-emoji">✍️</span><span class="link-text">Create</span></a></li>
    </ul>
  </nav>

  <main class="page">
    <div class="section-header">
      <h2>🥁 Rhythm Practice</h2>
      <p>Hit [SPACE] to the rhythm. Keep it steady!</p>
    </div>

    <div class="stats-header">
      <div class="stat-pill">Score: <span id="scoreVal">0</span></div>
      <div class="stat-pill" id="currentBpmDisplay">80 BPM</div>
      <div class="stat-pill">Accuracy: <span id="accuracyVal">100</span>%</div>
    </div>

    <div class="game-area">
      <div id="feedbackBox" class="feedback-box">All Correct!</div>
      
      <div id="scrollingTrack">
        <div id="staffContainer"></div>
        <div id="sweepLine" class="sweep-line"></div>
      </div>

      <div id="gameControls" class="game-controls">
        <button id="restartBtn" class="control-btn">🔄 Restart</button>
        <button id="quitBtn" class="control-btn">🚪 Quit</button>
      </div>

      <!-- SETUP OVERLAY -->
      <div id="gameOverlay" class="game-overlay">
        <div class="setup-card">
          <h3 style="margin-bottom: 2rem; text-align: center; font-family: var(--font-display);">Rhythm Settings</h3>
          
          <div class="config-grid">
            <div class="config-item">
              <label class="config-label">BPM</label>
              <input type="number" id="bpmInput" class="input-field" value="80" min="40" max="200">
            </div>
            
            <div class="config-item">
              <label class="config-label">Exercise Length</label>
              <select id="lengthSelect" class="input-field">
                <option value="4">4 Bars (Restart on miss)</option>
                <option value="unlimited">Unlimited</option>
              </select>
            </div>

            <div class="config-item" style="grid-column: span 2;">
              <label class="config-label">Display & Sound</label>
              <div class="checkbox-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <label class="checkbox-item"><input type="checkbox" id="sweepCheck" checked> Sweep Line</label>
                <label class="checkbox-item"><input type="checkbox" id="metronomeCheck" checked> Metronome</label>
                <label class="checkbox-item"><input type="checkbox" id="restCheck"> Include Rests</label>
              </div>
            </div>
          </div>

          <button id="startGameBtn" class="btn btn-primary" style="width: 100%; padding: 1.2rem; font-size: 1.1rem;">🚀 Start Session</button>
        </div>
      </div>
    </div>

    <div id="messageBox"></div>
  </main>

  <footer class="footer">
    Made with <span>♥</span> for brass musicians · ValveTrainer
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/vexflow@3.0.9/releases/vexflow-min.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/rhythm-practice.js"></script>
</body>
</html>
